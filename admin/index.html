<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel · Chatbot</title>
  <link rel="stylesheet" href="/admin/styles.css" />
</head>
<body>
  <!-- Gate de token -->
  <div id="gate">
    <div class="card">
      <div class="logo">💬</div>
      <h2>Panel del Chatbot</h2>
      <p>Ingresá tu token de administrador para continuar.</p>
      <input id="gate-token" type="password" placeholder="ADMIN_API_KEY" autocomplete="off" />
      <p class="hint">Es el valor de <code>ADMIN_API_KEY</code> en las variables del servidor.</p>
      <button class="btn-primary" id="gate-btn">Entrar</button>
      <div class="err" id="gate-err"></div>
    </div>
  </div>

  <header style="display:none">
    <h1>💬 Chatbot</h1>
    <span class="badge">panel</span>
    <div class="spacer"></div>
    <button class="btn-ghost" id="logout">Salir</button>
  </header>

  <main style="display:none">
    <div class="tabs">
      <button class="tab active" data-tab="resumen">Resumen</button>
      <button class="tab" data-tab="leads">Leads</button>
      <button class="tab" data-tab="ads">Generar anuncios</button>
    </div>

    <!-- Resumen / dashboard -->
    <section id="tab-resumen" class="section">
      <div id="dash"><div class="sk-row" style="height:96px;margin-bottom:14px"></div></div>
    </section>

    <!-- Leads -->
    <section id="tab-leads" class="section" style="display:none">
      <div class="toolbar">
        <div>
          <label>Proyecto</label>
          <select id="filter-project">
            <option value="">Todos</option>
            <option value="agencia">Agencia</option>
            <option value="mesa">Mesa</option>
            <option value="ticketera">Ticketera</option>
          </select>
        </div>
        <div>
          <label>Estado</label>
          <select id="filter-status">
            <option value="">Todos</option>
            <option value="new">Nuevo</option>
            <option value="contacted">Contactado</option>
            <option value="qualified">Calificado</option>
            <option value="lost">Perdido</option>
          </select>
        </div>
        <button class="btn-ghost" id="reload">↻ Actualizar</button>
      </div>
      <div class="card"><div id="leads-content"></div></div>
    </section>

    <!-- Anuncios -->
    <section id="tab-ads" class="section" style="display:none">
      <div class="card">
        <div class="field">
          <label>Proyecto</label>
          <select id="ad-project">
            <option value="agencia">Agencia — Gonzalo Ferraro Automóviles</option>
            <option value="mesa">Mesa — Helpdesk</option>
            <option value="ticketera">Ticketera — Soporte Dedalus</option>
          </select>
        </div>
        <div class="field">
          <label>¿Qué querés promocionar? (brief)</label>
          <textarea id="ad-brief" maxlength="1000" placeholder="Ej: Financiación 0% en autos 0km para este mes"></textarea>
        </div>
        <div class="field">
          <label>Plataforma</label>
          <select id="ad-channel">
            <option value="ambos">Facebook + Instagram</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
          </select>
        </div>
        <button class="btn-primary" id="ad-generate">Generar 3 variantes</button>
        <div class="err" id="ad-err"></div>
        <div id="ad-results"></div>
      </div>
    </section>
  </main>

  <div id="toast-wrap"></div>
  <script src="/admin/app.js"></script>
</body>
</html>
