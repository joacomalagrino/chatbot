# Configuración de Alembic (CLI). En runtime, database.init_db() arma la Config
# en código. La URL de la DB la provee env.py desde config.py (DATABASE_URL),
# acá NO se hardcodea para tener una sola fuente de verdad.
[alembic]
script_location = migrations
prepend_sys_path = .

# Logging: solo se aplica cuando se corre por CLI (env.py llama fileConfig si hay
# .ini). En runtime/tests la Config se arma sin archivo, así que esto no pisa el
# logging del proceso host.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
